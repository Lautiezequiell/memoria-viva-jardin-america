  <body>
    <noscript>Necesitas habilitar JavaScript para explorar esta plataforma cultural.</noscript>
    <div id="root"></div>
    <script>
      // Single Page App for GitHub Pages
      // Redirect to the index.html for all routes
      var path = window.location.pathname;
      var segments = path.split('/');
      var lastSegment = segments[segments.length - 1];
      
      // If it's not the root and doesn't have a file extension
      if (lastSegment && lastSegment.indexOf('.') === -1) {
        window.location.href = '/memoria-viva-jardin-america/';
      }
    </script>
  </body>
